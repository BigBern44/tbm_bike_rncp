# Connexion DuckDB + httpfs/S3 vers MinIO. Aucun secret ici : tout vient de
# l'environnement (voir .env.example).
dbt_velos:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'velos.duckdb') }}"
      threads: 4
      extensions:
        - httpfs
        - parquet
      settings:
        s3_endpoint: "{{ env_var('MINIO_ENDPOINT', 'localhost:9000') }}"
        s3_access_key_id: "{{ env_var('MINIO_ACCESS_KEY') }}"
        s3_secret_access_key: "{{ env_var('MINIO_SECRET_KEY') }}"
        s3_use_ssl: "{{ env_var('MINIO_USE_SSL', 'false') }}"
        s3_url_style: path
